apiVersion: v2
name: clickstack-agent
description: >-
  Modular OpenTelemetry telemetry agent for ClickStack spoke clusters.
  Ships node, container, kube-state, CoreDNS, control-plane and cert metrics
  plus all pod logs and Kubernetes events to a central ClickStack, fully
  labelled with k8s.* resource attributes for correlation.
type: application
version: 0.1.0
appVersion: "1.0.0"
