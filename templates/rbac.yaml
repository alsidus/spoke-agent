# Shared ServiceAccount + read-only RBAC for both collectors.
# k8sattributes needs pods + replicasets (to resolve Deployment owner chain);
# kubeletstats/prometheus SD need nodes + endpoints + services;
# k8sobjects needs events.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickstack-agent.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "clickstack-agent.name" . }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
      - nodes/metrics
      - nodes/stats
      - nodes/proxy
      - services
      - endpoints
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clickstack-agent.name" . }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clickstack-agent.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "clickstack-agent.name" . }}
    namespace: {{ .Release.Namespace }}
