{{- if .Values.metrics.certExporter }}
# =============================================================================
# cert-exporter — TLS certificate expiry metrics (#7). Watches Kubernetes TLS
# secrets cluster-wide and exposes expiry gauges, scraped by the cluster
# collector. Works on any cluster (no host cert paths needed).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [ secrets ]
    verbs: [ get, list, watch ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
subjects:
  - kind: ServiceAccount
    name: {{ include "clickstack-agent.name" . }}-cert-exporter
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickstack-agent
      app.kubernetes.io/component: cert-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickstack-agent
        app.kubernetes.io/component: cert-exporter
    spec:
      serviceAccountName: {{ include "clickstack-agent.name" . }}-cert-exporter
      containers:
        - name: cert-exporter
          image: "{{ .Values.certExporter.image.repository }}:{{ .Values.certExporter.image.tag }}"
          args:
            - --watch-kube-secrets
            {{- range .Values.certExporter.secretTypes }}
            - --secret-type={{ . }}
            {{- end }}
            - --listen-address=:9793
          ports:
            - name: http-metrics
              containerPort: 9793
          resources:
            limits: { cpu: "100m", memory: "128Mi" }
            requests: { cpu: "25m", memory: "32Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickstack-agent.name" . }}-cert-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-exporter
spec:
  selector:
    app.kubernetes.io/name: clickstack-agent
    app.kubernetes.io/component: cert-exporter
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 9793
{{- end }}
