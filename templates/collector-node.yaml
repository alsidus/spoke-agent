{{- if or .Values.logs.allNamespaces .Values.metrics.node .Values.metrics.container }}
# =============================================================================
# Node-local collector (DaemonSet): pod logs, host metrics, container metrics.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickstack-agent.name" . }}-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      {{- if .Values.logs.allNamespaces }}
      filelog:
        include: [ /var/log/pods/*/*/*.log ]
        exclude:
          - /var/log/pods/*_{{ include "clickstack-agent.name" . }}*/*/*.log
          {{- range .Values.logs.excludeNamespaces }}
          - /var/log/pods/{{ . }}_*/*/*.log
          {{- end }}
        start_at: end
        include_file_path: true
        include_file_name: false
        retry_on_failure:
          enabled: true
        operators:
          # Parses CRI/containerd log format and extracts k8s.pod.name,
          # k8s.namespace.name, k8s.container.name from the file path.
          - type: container
            id: container-parser
            add_metadata_from_filepath: true
      {{- end }}
      {{- if .Values.metrics.node }}
      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu: {}
          load: {}
          memory: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              mount_points: [ "/var/lib/kubelet/*", "/proc/*", "/sys/*" ]
              match_type: regexp
          network: {}
          paging: {}
          processes: {}
      {{- end }}
      {{- if .Values.metrics.container }}
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_IP}:10250"
        insecure_skip_verify: true
        metric_groups: [ node, pod, container, volume ]
        extra_metadata_labels: [ container.id ]
      {{- end }}

    processors:
      {{- include "clickstack-agent.processors" . | nindent 6 }}
      # Stamp the node name (from downward API) onto host + container metrics.
      resource/node:
        attributes:
          - key: k8s.node.name
            value: "${env:K8S_NODE_NAME}"
            action: upsert

    exporters:
      otlphttp:
        endpoint: {{ .Values.clickstack.endpoint | quote }}
        tls:
          insecure: true
        headers:
          Authorization: {{ .Values.clickstack.apiKey | quote }}

    service:
      telemetry:
        metrics:
          level: none
      pipelines:
        {{- if .Values.logs.allNamespaces }}
        logs:
          receivers: [ filelog ]
          processors: [ memory_limiter, k8sattributes, resource, resource/node, batch ]
          exporters: [ otlphttp ]
        {{- end }}
        {{- if or .Values.metrics.node .Values.metrics.container }}
        metrics:
          receivers: [ {{ if .Values.metrics.node }}hostmetrics{{ end }}{{ if and .Values.metrics.node .Values.metrics.container }}, {{ end }}{{ if .Values.metrics.container }}kubeletstats{{ end }} ]
          processors: [ memory_limiter, k8sattributes, resource, resource/node, batch ]
          exporters: [ otlphttp ]
        {{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "clickstack-agent.name" . }}-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clickstack-agent
      app.kubernetes.io/component: node-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickstack-agent
        app.kubernetes.io/component: node-collector
      annotations:
        checksum/config: {{ toYaml .Values | sha256sum }}
    spec:
      serviceAccountName: {{ include "clickstack-agent.name" . }}
      tolerations:
        - operator: Exists   # run on every node, including control-plane
      containers:
        - name: collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: [ "--config=/etc/otel/config.yaml" ]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: K8S_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            {{- toYaml .Values.resources.daemonset | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            {{- if .Values.metrics.node }}
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
            {{- end }}
            {{- if .Values.logs.allNamespaces }}
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "clickstack-agent.name" . }}-node
        {{- if .Values.metrics.node }}
        - name: hostfs
          hostPath:
            path: /
        {{- end }}
        {{- if .Values.logs.allNamespaces }}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        {{- end }}
{{- end }}
