{{- if .Values.metrics.kubeState }}
# =============================================================================
# kube-state-metrics — object/state metrics (#2). Scraped by the cluster
# collector's prometheus receiver.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [ configmaps, secrets, nodes, pods, services, serviceaccounts, resourcequotas, replicationcontrollers, limitranges, persistentvolumeclaims, persistentvolumes, namespaces, endpoints ]
    verbs: [ list, watch ]
  - apiGroups: [ apps ]
    resources: [ statefulsets, daemonsets, deployments, replicasets ]
    verbs: [ list, watch ]
  - apiGroups: [ batch ]
    resources: [ cronjobs, jobs ]
    verbs: [ list, watch ]
  - apiGroups: [ autoscaling ]
    resources: [ horizontalpodautoscalers ]
    verbs: [ list, watch ]
  - apiGroups: [ policy ]
    resources: [ poddisruptionbudgets ]
    verbs: [ list, watch ]
  - apiGroups: [ networking.k8s.io ]
    resources: [ ingresses, networkpolicies ]
    verbs: [ list, watch ]
  - apiGroups: [ storage.k8s.io ]
    resources: [ storageclasses, volumeattachments ]
    verbs: [ list, watch ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickstack-agent
      app.kubernetes.io/component: kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickstack-agent
        app.kubernetes.io/component: kube-state-metrics
    spec:
      serviceAccountName: {{ include "clickstack-agent.name" . }}-kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: "{{ .Values.kubeStateMetrics.image.repository }}:{{ .Values.kubeStateMetrics.image.tag }}"
          ports:
            - name: http-metrics
              containerPort: 8080
          resources:
            limits: { cpu: "200m", memory: "256Mi" }
            requests: { cpu: "50m", memory: "64Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickstack-agent.name" . }}-kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickstack-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
spec:
  selector:
    app.kubernetes.io/name: clickstack-agent
    app.kubernetes.io/component: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
{{- end }}
